# ═══════════════════════════════════════════════════════════════════════
# SSVM College Square — Docker Compose Configuration
# 2-Container Architecture: Application + Database
# ═══════════════════════════════════════════════════════════════════════
#
#   Container 1: APPLICATION — Frontend (Next.js) + Backend (Express.js)
#   Container 2: DATABASE    — PostgreSQL 16
#
#   Clean separation: Application logic in one container, data in another
#
#   Usage:
#     docker compose up -d --build        # Build and start
#     docker compose logs -f              # View logs
#     docker compose down                 # Stop (keeps data)
#     docker compose down -v              # Stop and remove data
#
# ═══════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────
  # Container 1: DATABASE (PostgreSQL 16)
  # Dedicated database container with persistent storage
  # ─────────────────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: ssvm-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ssvm_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      # Persistent database storage
      - ssvm_database:/var/lib/postgresql/data
    networks:
      - ssvm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ssvm_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────
  # Container 2: APPLICATION (Frontend + Backend)
  # Next.js frontend and Express.js backend running together
  # ─────────────────────────────────────────────────────────────────────
  application:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssvm-application
    restart: unless-stopped
    environment:
      # Node environment
      NODE_ENV: production
      
      # Database connection (connects to database container)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-ssvm_platform}
      
      # Backend configuration
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-ssvm-college-square-jwt-secret-2025-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: /app/backend/uploads
      
      # Frontend configuration
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-5000}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
    ports:
      # Frontend port
      - "${FRONTEND_PORT:-3000}:3000"
      # Backend API port
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      # Persistent file uploads (gallery images, etc.)
      - ssvm_uploads:/app/backend/uploads
    depends_on:
      database:
        condition: service_healthy
    networks:
      - ssvm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ─────────────────────────────────────────────────────────────────────
# Network Configuration
# ─────────────────────────────────────────────────────────────────────
networks:
  ssvm-network:
    driver: bridge
    name: ssvm-network

# ─────────────────────────────────────────────────────────────────────
# Persistent Volumes
# ─────────────────────────────────────────────────────────────────────
volumes:
  # Database data (PostgreSQL)
  ssvm_database:
    name: ssvm_database
    driver: local
  
  # Uploaded files (gallery images, documents, etc.)
  ssvm_uploads:
    name: ssvm_uploads
    driver: local
